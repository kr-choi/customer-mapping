var timeoutTimer;

function checkPass() {
  var input = document.getElementById("passInput").value;

  if (input === PASSCODE) {
    document.getElementById("lockScreen").style.display = "none";
    startInactivityTimer();
  } else {
    var msg = document.getElementById("errorMsg");
msg.style.display = "block";
  }
}
document.getElementById("errorMsg").style.display = "none";
function startInactivityTimer() {


  resetTimer();

  document.onmousemove = resetTimer;
  document.onkeydown = resetTimer;
  document.onclick = resetTimer;
}

function resetTimer() {

  clearTimeout(timeoutTimer);

  timeoutTimer = setTimeout(function() {
    document.getElementById("lockScreen").style.display = "flex";
    document.getElementById("passInput").value = "";
  }, 10 * 60 * 1000); // 10분
}

document.getElementById("passInput").addEventListener("keypress", function(e) {

var personSet = new Set();
customers.forEach(c => personSet.add(c.person));

var box = document.getElementById("personFilterBox");

// 담당자별 고객 수 계산
var personCount = {};
customers.forEach(c => {
  personCount[c.person] = (personCount[c.person] || 0) + 1;
});

var totalCount = customers.length;

var headerHtml = `
<label style="display:block; font-size:14px; font-weight:bold; margin-bottom:6px;">
  <input type="checkbox" id="selectAllPerson" checked onchange="toggleAllPerson(this)" style="transform:scale(1.3); margin-right:6px;">

`;

document.getElementById("personFilterBox").insertAdjacentHTML("beforebegin", headerHtml);

personSet.forEach(p => {
box.innerHTML += `
  <label style="display:block; font-size:14px; line-height:22px;">
    <input type="checkbox" value="${p}" checked onchange="filterByPersonMulti()" style="transform:scale(1.3); margin-right:6px;" />
    ${p} <span style="color:#888;">(${personCount[p]})</span>
  </label>
`;
});

var customerMarkers = [];

customers.forEach(c => {

  var marker = L.marker([c.lat, c.lng]).addTo(map);

  customerMarkers.push({ marker: marker, data: c });

  marker.bindPopup(`
    <b>${c.name}</b><br>
    ${c.company}<br>
    ${c.person}<br>
    ${c.address}<br>
    ${c.industry}<br><br>
    <button onclick="setStart(${c.lat}, ${c.lng})">출발</button>
    <button onclick="setEnd(${c.lat}, ${c.lng})">도착</button>
  `);

  marker.bindTooltip(`<b>${c.name}</b><br>${c.person}`, {
    direction: 'top',
    offset: [-15, -12]
  });
});

/* =========================
   검색 기능 (추가)
========================= */
function searchCustomers() {

  var keyword = document.getElementById("searchBox").value.toLowerCase();

  customerMarkers.forEach(obj => {

    var text = `
      ${obj.data.name}
      ${obj.data.company}
      ${obj.data.person}
    `.toLowerCase();

    if (text.includes(keyword)) {
      map.addLayer(obj.marker);
    } else {
      map.removeLayer(obj.marker);
    }
  });
}

/* =========================
   FILTER FUNCTIONS
========================= */
function toggleAllPerson(el) {

  var checked = el.checked;

  document.querySelectorAll('#personFilterBox input[type="checkbox"]').forEach(cb => {
    cb.checked = checked;
  });

  filterByPersonMulti();
}

function filterByPersonMulti() {

  var checked = Array.from(
    document.querySelectorAll('#personFilterBox input[type="checkbox"]:checked')
  ).map(el => el.value);

  customerMarkers.forEach(obj => {

    var person = obj.data.person;

    var show = checked.includes(person);

    if (show) {
      map.addLayer(obj.marker);
    } else {
      map.removeLayer(obj.marker);
    }
  });

  document.getElementById("recommendBox").style.display = "none";
}

/* ========================= */

function setStart(lat, lng) {
  startPoint = L.latLng(lat, lng);
  map.closePopup();

  if (startMarker) map.removeLayer(startMarker);

  startMarker = L.marker([lat, lng]).addTo(map)
    .bindTooltip("출발", {
      permanent: true,
      direction: 'top',
      offset: [-16, -10],
      className: 'custom-label start-label'
    });

  drawRoute();
}

function setEnd(lat, lng) {
  endPoint = L.latLng(lat, lng);
  map.closePopup();

  if (endMarker) map.removeLayer(endMarker);

  endMarker = L.marker([lat, lng]).addTo(map)
    .bindTooltip("도착", {
      permanent: true,
      direction: 'top',
      offset: [-16, -10],
      className: 'custom-label end-label'
    });

  drawRoute();
}

function drawRoute() {

  if (routeControl) {
    map.removeControl(routeControl);
    routeControl = null;
  }

  if (startPoint && endPoint) {

    routeControl = L.Routing.control({
      waypoints: [startPoint, endPoint],
      routeWhileDragging: false,
      lineOptions: {
        styles: [{ color: 'green', weight: 12 }]
      }
    }).addTo(map);

    routeControl.on('routesfound', function(e) {
      routeSummary = e.routes[0].summary;
      showNearbyCustomers(endPoint);
      addCancelButton();
    });
  }
}

function addCancelButton() {

  var container = document.querySelector('.leaflet-routing-container');
  if (!container) return;

  if (document.getElementById("routeCancelBtn")) return;

  var btn = document.createElement("button");
  btn.id = "routeCancelBtn";
  btn.className = "route-cancel-btn";
  btn.innerText = "경로 취소";
  btn.onclick = clearRoute;

  container.appendChild(btn);
}

function showNearbyCustomers(center) {

  nearbyLayer.clearLayers();

  var arrivalList = [];
  var routeList = [];

  customers.forEach(c => {

    if (
      (startPoint && c.lat === startPoint.lat && c.lng === startPoint.lng) ||
      (endPoint && c.lat === endPoint.lat && c.lng === endPoint.lng)
    ) return;

    var dist = getDistance(center.lat, center.lng, c.lat, c.lng);

    var obj = customerMarkers.find(m => m.data === c);
    if (!obj) return;

    var routeDist = distanceToSegment(
      [c.lat, c.lng],
      [startPoint.lat, startPoint.lng],
      [endPoint.lat, endPoint.lng]
    );
arrivalList.sort((a,b) => a.value - b.value);
routeList.sort((a,b) => a.value - b.value);

var limitedArrival = arrivalList.slice(0, 3);
var limitedRoute = routeList.slice(0, 3);
    if (dist < 3) {

      map.addLayer(obj.marker);
      obj.marker.setIcon(greenIcon);

      var distText = dist < 1 ? Math.round(dist * 1000)+" m" : dist.toFixed(2)+" km";

      L.circleMarker([c.lat, c.lng], {
        color: 'red',
        radius: 8
      })
      .bindTooltip(distText, { permanent: true, direction: 'top', offset: [1, -35] })
      .addTo(nearbyLayer);

      arrivalList.push({ name: c.name, dist: distText, value: dist });

    } else if (routeDist < 2) {

      map.addLayer(obj.marker);
      obj.marker.setIcon(yellowIcon);

      var distText = routeDist < 1 ? Math.round(routeDist * 1000)+" m" : routeDist.toFixed(2)+" km";

      L.circleMarker([c.lat, c.lng], {
        color: 'blue',
        radius: 8
      })
      .bindTooltip(distText, { permanent: true, direction: 'top', offset: [1, -35] })
      .addTo(nearbyLayer);

      routeList.push({ name: c.name, dist: distText, value: routeDist });

    } else {
      obj.marker.setIcon(defaultIcon);
      map.removeLayer(obj.marker);
    }
  });

  var box = document.getElementById("recommendBox");


  box.style.display = "block";

var limitedArrival = arrivalList.slice(0, 3);   // ⭐ 최대 3개
var limitedRoute = routeList.slice(0, 3);       // ⭐ 최대 3개

box.innerHTML = `
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <b>추천 고객</b>
    <span id="recommendToggleBtn" style="cursor:pointer;" onclick="toggleRecommendBox()">−</span>
  </div>

  <div id="recommendContent">
  <div class="recommend-title title-arrival">도착지 근처</div>
  ${limitedArrival.map(x => `${x.name} (${x.dist})`).join("<br>") || "없음"}

  <div class="recommend-title title-route">경로 근처</div>
  ${limitedRoute.map(x => `${x.name} (${x.dist})`).join("<br>") || "없음"}
`;
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function distanceToSegment(p, v, w) {

  function sqr(x){return x*x;}
  function dist2(a,b){return sqr(a[0]-b[0])+sqr(a[1]-b[1]);}

  let l2 = dist2(v,w);
  if(l2===0) return Math.sqrt(dist2(p,v));

  let t=((p[0]-v[0])*(w[0]-v[0])+(p[1]-v[1])*(w[1]-v[1]))/l2;
  t=Math.max(0,Math.min(1,t));

  let proj=[v[0]+t*(w[0]-v[0]), v[1]+t*(w[1]-v[1])];
  return Math.sqrt(dist2(p,proj)) * 111;
}

function clearRoute() {

  if (routeControl) {
    map.removeControl(routeControl);
    routeControl = null;
  }

  routeSummary = null;

  if (startMarker) map.removeLayer(startMarker);
  if (endMarker) map.removeLayer(endMarker);

  startMarker = null;
  endMarker = null;

  startPoint = null;
  endPoint = null;

  nearbyLayer.clearLayers();

  document.getElementById("recommendBox").style.display = "none";

  customerMarkers.forEach(obj => {
    obj.marker.setIcon(defaultIcon);
    map.addLayer(obj.marker);
  });
}
function toggleFilter() {
  var panel = document.getElementById("filterPanel");
  panel.classList.toggle("active");
}

  var panel = document.getElementById("filterPanel");
  var personBox = document.getElementById("personFilterBox");
  var header = document.querySelector('#filterPanel label'); // ⭐ 전체 체크박스 라인

  if (!filterCollapsed) {
    personBox.style.display = "none";
    if (header) header.style.display = "none";  // ⭐ 전체도 숨김
    panel.style.maxHeight = "auto";
    panel.style.minHeight = "60px";
    btn.innerHTML = "+";   // ⭐ 변경
    filterCollapsed = true;
  } else {
    personBox.style.display = "block";
    if (header) header.style.display = "block"; // ⭐ 다시 표시
    panel.style.maxHeight = "auto";
    btn.innerHTML = "−";   // ⭐ 변경
    filterCollapsed = false;
  }
}
var recommendCollapsed = false;

function toggleRecommendBox() {
  var box = document.getElementById("recommendBox");
  var content = document.getElementById("recommendContent");
  var btn = document.getElementById("recommendToggleBtn");

  if (!recommendCollapsed) {
    box.style.maxHeight = "40px";   // ⭐ 타이틀만 보이게
   content.style.display = "none";
    box.style.overflow = "hidden";
    btn.innerHTML = "+";
    recommendCollapsed = true;
  } else {
    box.style.maxHeight = "180px";
    content.style.display = "block";
    box.style.overflow = "auto";
    btn.innerHTML = "−";
    recommendCollapsed = false;
  }
}
